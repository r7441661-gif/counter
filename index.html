<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Счётчик кликов</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#f3f5f7;
    padding:20px;
    color:#222;
}

.container{
    max-width:520px;
    margin:auto;
}

.total{
    background:#1f2937;
    color:#fff;
    border-radius:20px;
    padding:24px;
    text-align:center;
    margin-bottom:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.total-title{
    font-size:18px;
    opacity:.85;
    margin-bottom:8px;
}

.total-value{
    font-size:48px;
    font-weight:700;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.counter-button{
    width:100%;
    border:3px solid;
    border-radius:18px;
    padding:18px 20px;
    font-size:18px;
    font-weight:600;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:.15s;
}

.counter-button:active{
    transform:scale(.98);
}

.counter-value{
    font-size:26px;
    font-weight:700;
    min-width:50px;
    text-align:right;
}

.reset{
    width:100%;
    margin-top:24px;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#ef4444;
    color:#fff;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.15s;
}

.reset:active{
    transform:scale(.98);
}

.pink-blue{
    background:#ffe7f2;
    border-color:#7dc7ff;
}

.pink-white{
    background:#ffe4ee;
    border-color:#f5f5f5;
}

.blue-white{
    background:#dff2ff;
    border-color:#ffffff;
}

.orange-white{
    background:#ffe7cc;
    border-color:#ffffff;
}

.beige-green{
    background:#efe4d1;
    border-color:#8ecf95;
}

@media (max-width:480px){

.counter-button{
    font-size:17px;
    padding:20px 18px;
}

.counter-value{
    font-size:28px;
}

.total-value{
    font-size:54px;
}

}
</style>
</head>
<body>

<div class="container">

    <div class="total">
        <div class="total-title">Общее количество нажатий</div>
        <div class="total-value" id="total">0</div>
    </div>

    <div class="buttons" id="buttons"></div>

    <button class="reset" id="resetButton">
        Сбросить всё
    </button>

</div>

<script>

const items = [
{
name:"Розово-голубой",
class:"pink-blue"
},
{
name:"Розово-белый",
class:"pink-white"
},
{
name:"Сине-белый",
class:"blue-white"
},
{
name:"Оранжево-белый",
class:"orange-white"
},
{
name:"Бежево-зеленый",
class:"beige-green"
}
];

let counters = JSON.parse(localStorage.getItem("clickCounters"));

if(!Array.isArray(counters) || counters.length!==items.length){
    counters = new Array(items.length).fill(0);
}

const buttonsContainer = document.getElementById("buttons");

items.forEach((item,index)=>{

    const button=document.createElement("button");
    button.className=`counter-button ${item.class}`;

    button.innerHTML=`
        <span>${item.name}</span>
        <span class="counter-value" id="count-${index}">${counters[index]}</span>
    `;

    button.addEventListener("click",()=>{

        counters[index]++;

        save();
        update();

    });

    buttonsContainer.appendChild(button);

});

function save(){
    localStorage.setItem("clickCounters",JSON.stringify(counters));
}

function update(){

    counters.forEach((value,index)=>{
        document.getElementById(`count-${index}`).textContent=value;
    });

    const total=counters.reduce((sum,value)=>sum+value,0);

    document.getElementById("total").textContent=total;

}

document.getElementById("resetButton").addEventListener("click",()=>{

    if(confirm("Сбросить все счётчики?")){

        counters=new Array(items.length).fill(0);

        save();
        update();

    }

});

update();

</script>

</body>
</html>
